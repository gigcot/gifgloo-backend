global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: nginx
    static_configs:
      - targets:
          - nginx-exporter:9113

  - job_name: fastapi-loadtest
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8001

  - job_name: locust-pushgateway
    scrape_interval: 5s
    honor_labels: true
    static_configs:
      - targets:
          - pushgateway:9091
