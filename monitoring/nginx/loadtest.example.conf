log_format gifgloo_loadtest escape=json
  '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request":"$request",'
    '"status":"$status",'
    '"method":"$request_method",'
    '"uri":"$uri",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"request_time":"$request_time",'
    '"upstream_connect_time":"$upstream_connect_time",'
    '"upstream_header_time":"$upstream_header_time",'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_status":"$upstream_status",'
    '"host":"$host",'
    '"request_id":"$request_id",'
    '"loadtest_run_id":"$http_x_loadtest_run_id",'
    '"cf_ray":"$http_cf_ray",'
    '"user_agent":"$http_user_agent"'
  '}';

server {
  listen 8080;
  server_name 127.0.0.1 localhost api-loadtest.gifgloo.com;

  access_log /var/log/nginx/gifgloo_loadtest_access.log gifgloo_loadtest;
  error_log /var/log/nginx/gifgloo_loadtest_error.log warn;

  client_max_body_size 20m;

  location = /nginx_status {
    stub_status;
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;
  }

  location = /metrics {
    deny all;
  }

  location ~ ^/compositions/.+/status$ {
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Nginx-Upstream-Start $msec;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location / {
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Nginx-Upstream-Start $msec;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
}
